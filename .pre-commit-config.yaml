repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: Ruff Check
        entry: uv run ruff check .
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: ci-check
        name: Run Full CI (Lint, Type, Test)
        entry: bash -c "uv run ruff check . && uv run mypy . && uv run pytest -m 'not live'"
        language: system
        pass_filenames: false
        stages: [pre-push]
